<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masjid Attendance - Hafiz Rehman Ali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SheetJS for Excel Export -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            overscroll-behavior-y: contain;
        }
        .tap-highlight-none { -webkit-tap-highlight-color: transparent; }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #059669;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900">
    <div id="app" class="max-w-lg mx-auto min-h-screen bg-white shadow-2xl border-x border-slate-200 relative flex flex-col">
        
        <div id="status-bar" class="bg-slate-900 text-[10px] text-white px-4 py-1 flex justify-between items-center z-50">
            <span class="font-bold opacity-70 uppercase tracking-widest">Hafiz Rehman Ali's Class</span>
            <div id="network-status" class="flex items-center gap-1.5">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="font-black uppercase tracking-tighter">Online</span>
            </div>
        </div>

        <div id="loading-overlay" class="absolute inset-0 bg-white z-[100] flex flex-col items-center justify-center p-6 text-center">
            <div id="loading-spinner" class="loader mb-4"></div>
            <p id="loading-text" class="text-slate-500 font-medium tracking-tight text-sm">Connecting to Cloud Database...</p>
            <button id="retry-btn" onclick="window.location.reload()" class="hidden mt-4 px-6 py-2 bg-emerald-600 text-white rounded-xl font-bold shadow-lg shadow-emerald-100">Retry Connection</button>
        </div>

        <div id="main-content" class="hidden flex-1 overflow-y-auto">
            <div id="view-container"></div>
        </div>

        <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl transition-all duration-300 opacity-0 translate-y-10 pointer-events-none z-[200] flex items-center gap-3 border border-white/10">
            <i id="toast-icon" data-lucide="info" class="w-4 h-4 text-emerald-400"></i>
            <span id="toast-message" class="text-sm font-bold tracking-tight"></span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, deleteDoc, updateDoc, enableNetwork } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDQtbMxiCin7dgibXrtrCP7WlAE4cJBaLk",
            authDomain: "masjid-attendance-76cd1.firebaseapp.com",
            projectId: "masjid-attendance-76cd1",
            storageBucket: "masjid-attendance-76cd1.firebasestorage.app",
            messagingSenderId: "728861290937",
            appId: "1:728861290937:web:4b99938f61f7f9d78dc668"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'masjid-attendance-76cd1-v1';

        let state = {
            user: null,
            isLoggedIntoApp: false,
            view: 'login',
            students: [],
            allAttendance: [],
            selectedDate: new Date().toISOString().split('T')[0],
            selectedReportMonth: new Date().toISOString().slice(0, 7),
            currentDayAttendance: {},
            searchQuery: '',
            editingStudent: null
        };

        const initAuth = async (retries = 5) => {
            const delay = (ms) => new Promise(res => setTimeout(res, ms));
            for (let i = 0; i < retries; i++) {
                try {
                    await signInAnonymously(auth);
                    return;
                } catch (error) {
                    if (i === retries - 1) {
                        document.getElementById('loading-spinner').classList.add('hidden');
                        document.getElementById('loading-text').innerText = "Network Error.";
                        document.getElementById('retry-btn').classList.remove('hidden');
                    }
                    await delay(1000);
                }
            }
        };

        onAuthStateChanged(auth, async (user) => {
            state.user = user;
            if (user) {
                try {
                    await enableNetwork(db);
                    document.getElementById('loading-overlay').classList.add('hidden');
                    document.getElementById('main-content').classList.remove('hidden');
                    startListeners();
                    render();
                } catch (e) { console.error(e); }
            }
        });

        function updateNetworkStatus(online) {
            const statusDiv = document.getElementById('network-status');
            if (!statusDiv) return;
            if (online) {
                statusDiv.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span><span class="font-black uppercase tracking-tighter">Online</span>`;
                enableNetwork(db);
            } else {
                statusDiv.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-red-500"></span><span class="font-black uppercase text-red-400 tracking-tighter">Offline</span>`;
                showToast("Connection Lost.", "wifi-off");
            }
        }

        window.addEventListener('online', () => updateNetworkStatus(true));
        window.addEventListener('offline', () => updateNetworkStatus(false));

        function startListeners() {
            if (!state.user) return;
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'students'), (snap) => {
                state.students = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => (parseInt(a.rollNo) || 0) - (parseInt(b.rollNo) || 0));
                render();
            });

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'attendance'), (snap) => {
                state.allAttendance = snap.docs.map(d => ({ date: d.id, ...d.data() }));
                render();
            });
        }

        async function fetchDayAttendance(date) {
            if (!state.user) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'attendance', date);
            try {
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    state.currentDayAttendance = snap.data().records || {};
                } else {
                    const defaults = {};
                    state.students.forEach(s => defaults[s.id] = 'P');
                    state.currentDayAttendance = defaults;
                }
            } catch (e) { showToast("Local Mode"); }
            render();
        }

        window.handleLogin = (e) => {
            if (e) e.preventDefault();
            const userIn = document.getElementById('login-user').value.toLowerCase().trim();
            const passIn = document.getElementById('login-pass').value.trim();
            if (userIn === "hafiz rehman ali" && passIn === "4248") {
                state.isLoggedIntoApp = true;
                state.view = 'dashboard';
                render();
                showToast("Assalamu Alaikum", "check-circle");
            } else {
                showToast("Login Denied", "shield-alert");
            }
        };

        window.setView = (viewName) => {
            if (!state.isLoggedIntoApp && viewName !== 'login') return;
            state.view = viewName;
            state.searchQuery = '';
            state.editingStudent = null;
            if (viewName === 'mark-attendance') fetchDayAttendance(state.selectedDate);
            const main = document.getElementById('main-content');
            if (main) main.scrollTop = 0;
            render();
        };

        window.handleSearch = (e) => {
            state.searchQuery = e.target.value.toLowerCase();
            render();
        };

        window.addStudent = async () => {
            const name = document.getElementById('new-student-name').value.trim();
            const father = document.getElementById('new-student-father').value.trim();
            const rollNo = document.getElementById('new-student-roll').value.trim();
            const contactNo = document.getElementById('new-student-contact').value.trim();
            const relation = document.getElementById('new-student-relation').value.trim();

            if (!name || !rollNo || !father) return showToast("Required: Roll#, Name & Father Name", "alert-circle");
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'students'), {
                    name, 
                    fatherName: father, 
                    rollNo, 
                    contactNo: contactNo || '', 
                    contactRelation: relation || 'Father',
                    createdAt: new Date().toISOString()
                });
                showToast("Registered", "user-plus");
                document.getElementById('new-student-name').value = '';
                document.getElementById('new-student-father').value = '';
                document.getElementById('new-student-contact').value = '';
                document.getElementById('new-student-relation').value = '';
            } catch (e) { showToast("Sync Error"); }
        };

        window.startEditing = (studentId) => {
            state.editingStudent = state.students.find(s => s.id === studentId);
            render();
        };

        window.saveEdit = async () => {
            const name = document.getElementById('edit-student-name').value.trim();
            const father = document.getElementById('edit-student-father').value.trim();
            const rollNo = document.getElementById('edit-student-roll').value.trim();
            const contactNo = document.getElementById('edit-student-contact').value.trim();
            const relation = document.getElementById('edit-student-relation').value.trim();

            if (!name || !rollNo || !father) return showToast("Required: Roll#, Name & Father Name", "alert-circle");
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'students', state.editingStudent.id);
                await updateDoc(docRef, { 
                    name, 
                    fatherName: father, 
                    rollNo, 
                    contactNo: contactNo || '', 
                    contactRelation: relation || 'Father' 
                });
                state.editingStudent = null;
                showToast("Updated", "check-circle");
                render();
            } catch (e) { showToast("Save failed"); }
        };

        window.cancelEdit = () => {
            state.editingStudent = null;
            render();
        };

        window.deleteStudent = async (id) => {
            if(confirm("Remove this student?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id));
                showToast("Removed", "trash-2");
            }
        };

        window.updateDate = (val) => {
            state.selectedDate = val;
            fetchDayAttendance(val);
        };

        window.updateReportMonth = (val) => {
            state.selectedReportMonth = val;
            render();
        };

        window.setStatus = (sid, status) => {
            state.currentDayAttendance[sid] = status;
            render();
        };

        window.markAll = (status) => {
            state.students.forEach(s => state.currentDayAttendance[s.id] = status);
            render();
        };

        window.saveAttendance = async () => {
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'attendance', state.selectedDate), {
                    date: state.selectedDate,
                    records: state.currentDayAttendance
                });
                showToast("Saved to Cloud", "cloud-upload");
                setView('dashboard');
            } catch (e) { showToast("Saved Offline"); }
        };

        window.downloadExcelReport = () => {
            const [year, month] = state.selectedReportMonth.split('-').map(Number);
            const daysInMonth = new Date(year, month, 0).getDate();
            const monthName = new Date(year, month - 1, 1).toLocaleString('default', { month: 'long', year: 'numeric' });

            const registerHeader = ["Roll No", "Student Name", "Father Name", ...Array.from({length: daysInMonth}, (_, i) => i + 1), "P", "A", "L", "%"];
            const registerRows = state.students.map(s => {
                let p = 0, a = 0, l = 0;
                const dailyAtt = [];
                for(let d=1; d<=daysInMonth; d++){
                    const dateStr = `${state.selectedReportMonth}-${String(d).padStart(2, '0')}`;
                    const dayRecord = state.allAttendance.find(rec => rec.date === dateStr);
                    const status = dayRecord?.records?.[s.id] || "-";
                    dailyAtt.push(status);
                    if(status === 'P') p++; else if(status === 'A') a++; else if(status === 'L') l++;
                }
                const total = p + a + l;
                const perc = total > 0 ? ((p / total) * 100).toFixed(0) : 0;
                return [s.rollNo, s.name, s.fatherName || "-", ...dailyAtt, p, a, l, `${perc}%`];
            });

            const directoryHeader = ["Roll No", "Student Name", "Father Name", "Whose Number?", "Contact Number"];
            const directoryRows = state.students.map(s => [s.rollNo, s.name, s.fatherName || "-", s.contactRelation || "Father", s.contactNo || "-"]);

            const wb = XLSX.utils.book_new();
            const wsRegister = XLSX.utils.aoa_to_sheet([
                [`MASJID ATTENDANCE REGISTER - ${monthName}`],
                [`Hafiz Rehman Ali's Class`],
                [],
                registerHeader,
                ...registerRows
            ]);
            wsRegister['!cols'] = [{ wch: 8 }, { wch: 22 }, { wch: 22 }, ...Array(daysInMonth).fill({ wch: 3.5 }), { wch: 5 }, { wch: 5 }, { wch: 5 }, { wch: 8 }];
            XLSX.utils.book_append_sheet(wb, wsRegister, "Monthly Register");

            const wsDirectory = XLSX.utils.aoa_to_sheet([
                ["STUDENT CONTACT DIRECTORY"],
                [`Updated: ${new Date().toLocaleDateString()}`],
                [],
                directoryHeader,
                ...directoryRows
            ]);
            wsDirectory['!cols'] = [{ wch: 10 }, { wch: 25 }, { wch: 25 }, { wch: 15 }, { wch: 20 }];
            XLSX.utils.book_append_sheet(wb, wsDirectory, "Contact Directory");

            XLSX.writeFile(wb, `Hafiz_Rehman_Register_${state.selectedReportMonth}.xlsx`);
            showToast("Register Generated", "file-spreadsheet");
        };

        window.downloadBackup = () => {
            const data = { students: state.students, attendance: state.allAttendance };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `masjid_database_backup.json`; a.click();
        };

        function showToast(msg, icon = "info") {
            const toast = document.getElementById('toast');
            if (!toast) return;
            const toastIcon = document.getElementById('toast-icon');
            document.getElementById('toast-message').innerText = msg;
            toastIcon.setAttribute('data-lucide', icon);
            lucide.createIcons();
            toast.classList.replace('opacity-0', 'opacity-100');
            toast.classList.replace('translate-y-10', 'translate-y-0');
            setTimeout(() => {
                toast.classList.replace('opacity-100', 'opacity-0');
                toast.classList.replace('translate-y-0', 'translate-y-10');
            }, 3000);
        }

        function render() {
            const container = document.getElementById('view-container');
            if (!container) return;

            if (state.view === 'login') {
                container.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center p-8 bg-emerald-700 text-white min-h-screen">
                        <div class="w-24 h-24 bg-white/20 backdrop-blur-md rounded-[32px] flex items-center justify-center mb-8 shadow-2xl border border-white/10">
                            <i data-lucide="shield-lock" class="w-12 h-12 text-white"></i>
                        </div>
                        <h1 class="text-3xl font-black mb-1 text-center tracking-tight leading-none">Madrasa Portal</h1>
                        <p class="text-emerald-100 opacity-90 mb-12 text-center font-medium">Hafiz Rehman Ali's Class</p>
                        <form onsubmit="handleLogin(event)" class="w-full max-w-xs space-y-4">
                            <input id="login-user" type="text" placeholder="Username" class="w-full p-4 bg-white/10 border border-white/20 rounded-2xl outline-none focus:bg-white/20 transition-all font-bold placeholder:text-white/30">
                            <input id="login-pass" type="password" placeholder="Password" class="w-full p-4 bg-white/10 border border-white/20 rounded-2xl outline-none focus:bg-white/20 transition-all font-bold placeholder:text-white/30">
                            <button type="submit" class="w-full bg-white text-emerald-800 py-4 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all">Unlock Dashboard</button>
                        </form>
                    </div>
                `;
            } else if (state.view === 'dashboard') {
                container.innerHTML = `
                    <div class="p-6">
                        <header class="flex justify-between items-start mb-8">
                            <div>
                                <h1 class="text-2xl font-black text-emerald-900 leading-tight tracking-tight">Assalamu Alaikum</h1>
                                <p class="text-slate-400 font-bold uppercase text-[9px] tracking-[0.2em]">Hafiz Rehman Ali's Class</p>
                            </div>
                            <button onclick="state.isLoggedIntoApp=false; setView('login')" class="p-2.5 text-slate-300 hover:text-red-500 transition-colors bg-slate-50 rounded-xl"><i data-lucide="power" class="w-5 h-5"></i></button>
                        </header>

                        <div class="grid grid-cols-2 gap-4 mb-8">
                            <button onclick="setView('mark-attendance')" class="flex flex-col items-center justify-center p-5 bg-emerald-600 text-white rounded-[28px] shadow-lg active:scale-95 transition-all">
                                <i data-lucide="calendar-check" class="mb-2 w-7 h-7"></i>
                                <span class="font-bold text-sm">Attendance</span>
                            </button>
                            <button onclick="setView('manage-students')" class="flex flex-col items-center justify-center p-5 bg-white text-slate-700 border border-slate-200 rounded-[28px] shadow-sm active:scale-95 transition-all">
                                <i data-lucide="users-2" class="mb-2 w-7 h-7 text-emerald-600"></i>
                                <span class="font-bold text-sm">Enrollment</span>
                            </button>
                            <button onclick="setView('reports')" class="flex flex-col items-center justify-center p-5 bg-white text-slate-700 border border-slate-200 rounded-[28px] shadow-sm active:scale-95 transition-all">
                                <i data-lucide="file-spreadsheet" class="mb-2 w-7 h-7 text-emerald-600"></i>
                                <span class="font-bold text-sm">Reports</span>
                            </button>
                            <button onclick="setView('contact-log')" class="flex flex-col items-center justify-center p-5 bg-emerald-50 text-emerald-800 border border-emerald-100 rounded-[28px] shadow-sm active:scale-95 transition-all">
                                <i data-lucide="phone" class="mb-2 w-7 h-7 text-emerald-600"></i>
                                <span class="font-bold text-sm">Contact Log</span>
                            </button>
                        </div>

                        <div class="bg-slate-900 text-white p-6 rounded-[36px] shadow-2xl relative overflow-hidden">
                            <div class="flex justify-between items-center mb-6">
                                <h3 class="text-xs font-black text-emerald-400 uppercase tracking-widest">Stats</h3>
                                <div class="px-2.5 py-1 bg-emerald-500/10 text-emerald-400 text-[10px] font-black rounded-full border border-emerald-500/20 uppercase tracking-tighter">Live Database</div>
                            </div>
                            <div class="grid grid-cols-3 gap-2 text-center">
                                <div><p class="text-2xl font-black">${state.students.length}</p><p class="text-[9px] uppercase font-bold text-slate-500">Students</p></div>
                                <div><p class="text-2xl font-black text-emerald-400">${state.allAttendance.length}</p><p class="text-[9px] uppercase font-bold text-slate-500">History</p></div>
                                <div><p class="text-2xl font-black text-amber-400">${new Date().getDate()}</p><p class="text-[9px] uppercase font-bold text-slate-500">Today</p></div>
                            </div>
                        </div>
                    </div>
                `;
            } else if (state.view === 'manage-students') {
                const filteredStudents = state.students.filter(s => s.name.toLowerCase().includes(state.searchQuery) || s.rollNo.includes(state.searchQuery));
                const lastRoll = state.students.length > 0 ? Math.max(...state.students.map(s => parseInt(s.rollNo) || 0)) : 0;
                
                container.innerHTML = `
                    <div class="p-6">
                        <div class="flex items-center gap-4 mb-6">
                            <button onclick="setView('dashboard')" class="p-2 bg-emerald-50 text-emerald-700 rounded-full"><i data-lucide="arrow-left"></i></button>
                            <h2 class="text-xl font-black text-emerald-900 leading-none">${state.editingStudent ? 'Update Profile' : 'Enrollment'}</h2>
                        </div>

                        ${state.editingStudent ? `
                            <div class="bg-emerald-50 p-6 rounded-[32px] border-2 border-emerald-100 shadow-sm space-y-4 mb-8">
                                <div class="flex gap-2">
                                    <div class="w-[80px] flex-shrink-0">
                                        <p class="text-[9px] font-black uppercase text-emerald-600 mb-1 ml-2">Roll #</p>
                                        <input id="edit-student-roll" type="number" class="w-full p-4 bg-white border border-emerald-200 rounded-2xl outline-none font-black text-center" value="${state.editingStudent.rollNo}">
                                    </div>
                                    <div class="flex-1">
                                        <p class="text-[9px] font-black uppercase text-emerald-600 mb-1 ml-2">Student Name</p>
                                        <input id="edit-student-name" class="w-full p-4 bg-white border border-emerald-200 rounded-2xl outline-none font-bold" value="${state.editingStudent.name}">
                                    </div>
                                </div>
                                <p class="text-[9px] font-black uppercase text-emerald-600 mb-1 ml-2">Father's Name</p>
                                <input id="edit-student-father" class="w-full p-4 bg-white border border-emerald-200 rounded-2xl outline-none font-bold" value="${state.editingStudent.fatherName}">
                                
                                <div class="flex gap-2 items-center">
                                    <div class="flex-1">
                                        <p class="text-[9px] font-black uppercase text-emerald-600 mb-1 ml-2">Phone Number</p>
                                        <input id="edit-student-contact" type="tel" class="w-full p-4 bg-white border border-emerald-200 rounded-2xl outline-none font-bold" value="${state.editingStudent.contactNo || ''}">
                                    </div>
                                    <div class="w-[120px]">
                                        <p class="text-[9px] font-black uppercase text-emerald-600 mb-1 ml-2">Whose Number?</p>
                                        <input id="edit-student-relation" class="w-full p-4 bg-white border border-emerald-200 rounded-2xl outline-none font-bold text-center" value="${state.editingStudent.contactRelation || ''}" placeholder="Father?">
                                    </div>
                                </div>

                                <div class="flex gap-2 pt-2">
                                    <button onclick="cancelEdit()" class="flex-1 bg-white text-slate-500 p-4 rounded-2xl font-black border border-slate-200 text-sm">Cancel</button>
                                    <button onclick="saveEdit()" class="flex-[2] bg-emerald-600 text-white p-4 rounded-2xl font-black shadow-lg text-sm">Update</button>
                                </div>
                            </div>
                        ` : `
                            <div class="bg-white p-5 rounded-[32px] border-2 border-slate-100 shadow-sm space-y-4 mb-8">
                                <div class="flex gap-2 items-center">
                                    <div class="w-[80px] flex-shrink-0">
                                        <p class="text-[9px] font-black uppercase text-slate-400 mb-1 ml-2">Roll #</p>
                                        <input id="new-student-roll" type="number" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-black text-center" value="${lastRoll + 1}">
                                    </div>
                                    <div class="flex-1">
                                        <p class="text-[9px] font-black uppercase text-slate-400 mb-1 ml-2">Student Name</p>
                                        <input id="new-student-name" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none" placeholder="Enter Name">
                                    </div>
                                </div>
                                <p class="text-[9px] font-black uppercase text-slate-400 mb-1 ml-2">Father's Name</p>
                                <input id="new-student-father" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none" placeholder="Enter Father Name">
                                
                                <div class="flex gap-2 items-center">
                                    <div class="flex-1">
                                        <p class="text-[9px] font-black uppercase text-slate-400 mb-1 ml-2">Phone Number</p>
                                        <input id="new-student-contact" type="tel" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none" placeholder="03xx-xxxxxxx">
                                    </div>
                                    <div class="w-[120px]">
                                        <p class="text-[9px] font-black uppercase text-slate-400 mb-1 ml-2">Whose Number?</p>
                                        <input id="new-student-relation" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none text-center font-bold" placeholder="Father?">
                                    </div>
                                </div>

                                <button onclick="addStudent()" class="w-full bg-emerald-600 text-white p-4 rounded-2xl font-black shadow-lg flex items-center justify-center gap-2"><i data-lucide="plus-circle" class="w-5 h-5"></i> Register</button>
                            </div>
                        `}

                        <div class="mb-4 relative">
                            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                            <input type="text" oninput="handleSearch(event)" value="${state.searchQuery}" class="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-2xl outline-none text-sm font-medium" placeholder="Search List...">
                        </div>

                        <div class="space-y-3">
                            ${filteredStudents.map(s => `
                                <div class="bg-white p-4 rounded-3xl border border-slate-100 flex justify-between items-center shadow-sm">
                                    <div class="flex items-center gap-4">
                                        <div class="w-10 h-10 bg-emerald-50 text-emerald-700 rounded-2xl flex items-center justify-center font-black border border-emerald-100 text-xs">${s.rollNo}</div>
                                        <div><p class="font-bold text-slate-800 leading-tight">${s.name}</p><p class="text-[10px] text-slate-400 font-bold uppercase tracking-tight">${s.fatherName}</p></div>
                                    </div>
                                    <div class="flex gap-1">
                                        <button onclick="startEditing('${s.id}')" class="p-2 text-slate-300 hover:text-emerald-500"><i data-lucide="user-cog" class="w-4.5 h-4.5"></i></button>
                                        <button onclick="deleteStudent('${s.id}')" class="p-2 text-slate-200 hover:text-red-500"><i data-lucide="trash-2" class="w-4.5 h-4.5"></i></button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (state.view === 'contact-log') {
                const filteredStudents = state.students.filter(s => s.name.toLowerCase().includes(state.searchQuery) || s.rollNo.includes(state.searchQuery));
                container.innerHTML = `
                    <div class="p-6">
                        <div class="flex items-center gap-4 mb-6">
                            <button onclick="setView('dashboard')" class="p-2 bg-emerald-50 text-emerald-700 rounded-full"><i data-lucide="arrow-left"></i></button>
                            <h2 class="text-xl font-black text-emerald-900 leading-none">Contact Log</h2>
                        </div>
                        <div class="mb-4 relative">
                            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                            <input type="text" oninput="handleSearch(event)" value="${state.searchQuery}" class="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-2xl outline-none text-sm font-medium" placeholder="Find contact...">
                        </div>
                        <div class="space-y-3">
                            ${filteredStudents.map(s => `
                                <div class="bg-white p-4 rounded-3xl border border-slate-100 flex justify-between items-center shadow-sm">
                                    <div class="flex items-center gap-4 overflow-hidden">
                                        <div class="w-10 h-10 bg-slate-900 text-white rounded-2xl flex-shrink-0 flex items-center justify-center font-black text-xs">${s.rollNo}</div>
                                        <div class="truncate">
                                            <p class="font-bold text-slate-800 leading-tight truncate">${s.name}</p>
                                            <p class="text-[11px] text-emerald-600 font-black tracking-tight uppercase">${s.contactRelation || 'Phone'}: ${s.contactNo || 'No Number'}</p>
                                        </div>
                                    </div>
                                    ${s.contactNo ? `<a href="tel:${s.contactNo}" class="w-12 h-12 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center"><i data-lucide="phone-call" class="w-5 h-5"></i></a>` : `<div class="w-12 h-12 bg-slate-50 text-slate-200 rounded-2xl flex items-center justify-center"><i data-lucide="phone-off" class="w-5 h-5"></i></div>`}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (state.view === 'mark-attendance') {
                const filteredStudents = state.students.filter(s => s.name.toLowerCase().includes(state.searchQuery) || s.rollNo.includes(state.searchQuery));
                container.innerHTML = `
                    <div class="p-6 pb-32">
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center gap-3">
                                <button onclick="setView('dashboard')" class="p-2 bg-emerald-50 text-emerald-700 rounded-full"><i data-lucide="arrow-left"></i></button>
                                <h2 class="text-xl font-black text-emerald-900">Daily Log</h2>
                            </div>
                            <input type="date" value="${state.selectedDate}" onchange="updateDate(this.value)" class="p-2 bg-emerald-50 border-0 rounded-xl text-xs font-black text-emerald-700 outline-none">
                        </div>
                        <div class="space-y-3">
                            ${filteredStudents.map(s => `
                                <div class="bg-white p-3 pr-2 rounded-[28px] border border-slate-100 shadow-sm flex justify-between items-center">
                                    <div class="flex-1 min-w-0 flex items-center gap-3">
                                        <div class="text-[11px] font-black text-slate-300 w-6 flex-shrink-0">${s.rollNo}</div>
                                        <div class="truncate"><p class="font-bold text-slate-800 text-md truncate leading-tight">${s.name}</p><p class="text-[9px] text-slate-400 font-bold uppercase truncate tracking-tight">${s.fatherName}</p></div>
                                    </div>
                                    <div class="flex gap-1">
                                        ${['P', 'A', 'L'].map(st => `
                                            <button onclick="setStatus('${s.id}', '${st}')" class="w-11 h-11 rounded-2xl font-black text-xs ${state.currentDayAttendance[s.id] === st ? (st === 'P' ? 'bg-emerald-500 text-white shadow-lg scale-105' : st === 'A' ? 'bg-red-500 text-white shadow-lg scale-105' : 'bg-amber-500 text-white shadow-lg scale-105') : 'bg-slate-50 text-slate-300'}">${st}</button>
                                        `).join('')}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="fixed bottom-0 left-0 right-0 max-w-lg mx-auto p-4 bg-white/95 backdrop-blur-md border-t border-slate-100 z-40">
                            <button onclick="saveAttendance()" class="w-full bg-emerald-600 text-white py-4 rounded-3xl font-black text-lg shadow-xl shadow-emerald-100 active:scale-95 transition-all">COMMIT ATTENDANCE</button>
                        </div>
                    </div>
                `;
            } else if (state.view === 'reports') {
                const statsMap = {};
                state.students.forEach(s => statsMap[s.id] = { roll: s.rollNo, name: s.name, P:0, A:0, L:0, total:0 });
                const filteredAtt = state.allAttendance.filter(day => day.date.startsWith(state.selectedReportMonth));
                filteredAtt.forEach(day => {
                    Object.entries(day.records || {}).forEach(([sid, status]) => {
                        if (statsMap[sid]) { statsMap[sid][status]++; statsMap[sid].total++; }
                    });
                });
                const reportData = Object.values(statsMap);
                container.innerHTML = `
                    <div class="p-6 pb-24">
                        <div class="flex items-center justify-between mb-6">
                            <div class="flex items-center gap-4">
                                <button onclick="setView('dashboard')" class="p-2 bg-emerald-50 text-emerald-700 rounded-full"><i data-lucide="arrow-left"></i></button>
                                <h2 class="text-xl font-black text-emerald-900 leading-none">Reports</h2>
                            </div>
                            <input type="month" value="${state.selectedReportMonth}" onchange="updateReportMonth(this.value)" class="p-2 bg-emerald-50 border-0 rounded-xl text-xs font-black text-emerald-700 outline-none">
                        </div>

                        <div class="bg-emerald-600 text-white p-5 rounded-[32px] mb-6 shadow-lg relative overflow-hidden flex justify-between items-center">
                             <div><p class="text-[10px] font-black uppercase opacity-80 mb-1 leading-none">Register Summary:</p><p class="font-black text-xl">${new Date(state.selectedReportMonth + '-01').toLocaleString('default', { month: 'long', year: 'numeric' })}</p></div>
                             <button onclick="downloadExcelReport()" class="bg-white/20 p-3 rounded-2xl border border-white/20 active:scale-90"><i data-lucide="file-spreadsheet" class="w-6 h-6 text-white"></i></button>
                        </div>

                        <div class="bg-white rounded-[36px] border border-slate-100 shadow-xl overflow-hidden">
                            <table class="w-full text-[11px]">
                                <thead class="bg-slate-50 border-b border-slate-100">
                                    <tr><th class="px-5 py-4 text-left font-black uppercase text-slate-400">Roll</th><th class="px-2 py-4 text-left font-black uppercase text-slate-400">Name</th><th class="py-4 text-center font-black uppercase text-emerald-600">P</th><th class="py-4 text-center font-black uppercase text-red-600">A</th><th class="px-5 py-4 text-right font-black uppercase text-slate-400">%</th></tr>
                                </thead>
                                <tbody class="divide-y divide-slate-50">
                                    ${reportData.map(row => {
                                        const perc = row.total > 0 ? ((row.P / row.total) * 100).toFixed(0) : 0;
                                        return `<tr><td class="px-5 py-4 font-black text-emerald-700">${row.roll}</td><td class="px-2 py-4 font-bold text-slate-700">${row.name}</td><td class="py-4 text-center font-black text-emerald-600">${row.P}</td><td class="py-4 text-center font-black text-red-600">${row.A}</td><td class="px-5 py-4 text-right"><span class="px-2 py-1 rounded-lg font-black ${perc >= 75 ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}">${perc}%</span></td></tr>`;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        window.onload = () => { initAuth(); render(); };
    </script>
</body>
</html>
