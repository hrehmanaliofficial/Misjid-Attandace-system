<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masjid Attendance - Hafiz Rehman Ali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- ExcelJS for Styled Professional Excel Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            overscroll-behavior-y: contain;
        }
        .tap-highlight-none { -webkit-tap-highlight-color: transparent; }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #059669;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 text-slate-900">
    <div id="app" class="max-w-lg mx-auto min-h-screen bg-white shadow-2xl border-x border-slate-200 relative flex flex-col">
        
        <!-- Connectivity Status Bar -->
        <div id="status-bar" class="bg-slate-900 text-[10px] text-white px-4 py-1 flex justify-between items-center z-50">
            <span class="font-bold opacity-70 uppercase tracking-widest">Hafiz Rehman Ali's Class</span>
            <div id="network-status" class="flex items-center gap-1.5">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="font-black uppercase tracking-tighter">Online</span>
            </div>
        </div>

        <!-- Auth / Loading Overlay -->
        <div id="loading-overlay" class="absolute inset-0 bg-white z-[100] flex flex-col items-center justify-center p-6 text-center">
            <div id="loading-spinner" class="loader mb-4"></div>
            <p id="loading-text" class="text-slate-500 font-medium tracking-tight text-sm">Connecting to Cloud Database...</p>
            <button id="retry-btn" onclick="window.location.reload()" class="hidden mt-4 px-6 py-2 bg-emerald-600 text-white rounded-xl font-bold shadow-lg shadow-emerald-100">Retry Connection</button>
        </div>

        <!-- Main Content Area -->
        <div id="main-content" class="hidden flex-1 overflow-y-auto pb-6">
            <div id="view-container"></div>
        </div>

        <!-- In-App Calling Desk Confirmation Modal -->
        <div id="call-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[250] flex items-center justify-center p-6 hidden opacity-0 transition-opacity duration-300">
            <div class="bg-white rounded-[32px] w-full max-w-sm p-6 shadow-2xl border border-slate-100 transform scale-95 transition-transform duration-300">
                <div class="w-16 h-16 bg-emerald-50 text-emerald-600 rounded-[20px] flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="phone-call" class="w-8 h-8"></i>
                </div>
                <h3 class="text-xl font-black text-slate-900 text-center mb-1 leading-tight">Calling Desk</h3>
                <p class="text-xs text-slate-400 font-bold text-center uppercase tracking-widest mb-6">Class Communication Link</p>
                
                <div class="bg-slate-50 rounded-2xl p-4 mb-6 space-y-2.5">
                    <div class="flex justify-between text-xs items-start">
                        <span class="text-slate-400 font-bold">Student Name:</span>
                        <span id="call-student-name" class="font-black text-slate-800 text-right leading-none"></span>
                    </div>
                    <div class="flex justify-between text-xs items-start">
                        <span class="text-slate-400 font-bold">Father's Name:</span>
                        <span id="call-father-name" class="font-bold text-slate-600 text-right leading-none"></span>
                    </div>
                    <div class="flex justify-between text-xs items-start">
                        <span class="text-slate-400 font-bold">Contact Target:</span>
                        <span id="call-relation" class="font-black text-emerald-700 uppercase tracking-wide bg-emerald-50 px-2 py-0.5 rounded border border-emerald-100 text-[10px] leading-none"></span>
                    </div>
                    <div class="flex justify-between text-xs items-center pt-2.5 border-t border-slate-200">
                        <span class="text-slate-400 font-bold">Phone Link:</span>
                        <span id="call-number" class="font-mono font-black text-sm text-slate-900"></span>
                    </div>
                </div>

                <div class="flex gap-2">
                    <button onclick="closeCallModal()" class="flex-1 py-3.5 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-2xl font-black text-xs transition-all active:scale-95">Cancel</button>
                    <a id="call-link-btn" href="#" class="flex-[2] py-3.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl font-black text-xs text-center shadow-lg shadow-emerald-100 transition-all active:scale-95 block">Place Call</a>
                </div>
            </div>
        </div>

        <!-- Notification Toast -->
        <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl transition-all duration-300 opacity-0 translate-y-10 pointer-events-none z-[200] flex items-center gap-3 border border-white/10">
            <i id="toast-icon" data-lucide="info" class="w-4 h-4 text-emerald-400"></i>
            <span id="toast-message" class="text-sm font-bold tracking-tight"></span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, deleteDoc, updateDoc, enableNetwork } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- OFFICIAL FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyDQtbMxiCin7dgibXrtrCP7WlAE4cJBaLk",
            authDomain: "masjid-attendance-76cd1.firebaseapp.com",
            projectId: "masjid-attendance-76cd1",
            storageBucket: "masjid-attendance-76cd1.firebasestorage.app",
            messagingSenderId: "728861290937",
            appId: "1:728861290937:web:4b99938f61f7f9d78dc668"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'masjid-attendance-76cd1-v1';

        // Helper to get current week's Monday
        function getMonday(d) {
            d = new Date(d);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setDate(diff));
        }

        // --- STATE ---
        let state = {
            user: null,
            isLoggedIntoApp: false,
            view: 'login',
            students: [],
            allAttendance: [],
            holidays: [], // Custom planned offs
            leaves: [],    // Custom range leaves
            selectedDate: new Date().toISOString().split('T')[0],
            selectedReportMonth: new Date().toISOString().slice(0, 7),
            selectedWeekStart: getMonday(new Date()).toISOString().split('T')[0],
            currentDayAttendance: {},
            currentDayReasons: {}, // Stored daily leave reasons
            searchQuery: '',
            editingStudent: null
        };

        // --- STREAMING_CHUNK: Loading authentications and network bindings... ---
        const initAuth = async (retries = 5) => {
            const delay = (ms) => new Promise(res => setTimeout(res, ms));
            for (let i = 0; i < retries; i++) {
                try {
                    await signInAnonymously(auth);
                    return;
                } catch (error) {
                    if (i === retries - 1) {
                        document.getElementById('loading-spinner').classList.add('hidden');
                        document.getElementById('loading-text').innerText = "Network Error.";
                        document.getElementById('retry-btn').classList.remove('hidden');
                    }
                    await delay(1000);
                }
            }
        };

        onAuthStateChanged(auth, async (user) => {
            state.user = user;
            if (user) {
                try {
                    await enableNetwork(db);
                    document.getElementById('loading-overlay').classList.add('hidden');
                    document.getElementById('main-content').classList.remove('hidden');
                    startListeners();
                    render();
                } catch (e) { console.error(e); }
            }
        });

        function updateNetworkStatus(online) {
            const statusDiv = document.getElementById('network-status');
            if (!statusDiv) return;
            if (online) {
                statusDiv.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span><span class="font-black uppercase tracking-tighter">Online</span>`;
                enableNetwork(db);
            } else {
                statusDiv.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-red-500"></span><span class="font-black uppercase text-red-400 tracking-tighter">Offline</span>`;
                showToast("Connection Lost.", "wifi-off");
            }
        }

        window.addEventListener('online', () => updateNetworkStatus(true));
        window.addEventListener('offline', () => updateNetworkStatus(false));

        // --- STREAMING_CHUNK: Initializing snapshot listeners for Students, Attendance, Holidays, and Leaves... ---
        function startListeners() {
            if (!state.user) return;
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'students'), (snap) => {
                state.students = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                    .sort((a, b) => (parseInt(a.rollNo) || 0) - (parseInt(b.rollNo) || 0));
                render();
            });

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'attendance'), (snap) => {
                state.allAttendance = snap.docs.map(d => ({ date: d.id, ...d.data() }));
                render();
            });

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'holidays'), (snap) => {
                state.holidays = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            });

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'leaves'), (snap) => {
                state.leaves = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            });
        }

        // Helper to evaluate active range leaves for a student on a specific date
        function getActiveLeave(studentId, dateStr) {
            return state.leaves.find(l => l.studentId === studentId && dateStr >= l.startDate && dateStr <= l.endDate);
        }

        // Helper to evaluate range-based planned offs / holidays
        function getActiveHoliday(dateStr) {
            return state.holidays.find(h => dateStr >= h.startDate && dateStr <= h.endDate);
        }

        async function fetchDayAttendance(date) {
            if (!state.user) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'attendance', date);
            try {
                const snap = await getDoc(docRef);
                if (snap.exists()) {
                    const data = snap.data();
                    state.currentDayAttendance = data.records || {};
                    state.currentDayReasons = data.reasons || {};
                    
                    // Auto override to L if student is on a scheduled range leave, or initialize new students
                    state.students.forEach(s => {
                        const activeLeave = getActiveLeave(s.id, date);
                        if (activeLeave) {
                            state.currentDayAttendance[s.id] = 'L';
                            state.currentDayReasons[s.id] = activeLeave.reason;
                        } else if (state.currentDayAttendance[s.id] === undefined) {
                            state.currentDayAttendance[s.id] = 'P';
                            state.currentDayReasons[s.id] = '';
                        }
                    });
                } else {
                    const defaults = {};
                    const defaultReasons = {};
                    state.students.forEach(s => {
                        const activeLeave = getActiveLeave(s.id, date);
                        if (activeLeave) {
                            defaults[s.id] = 'L';
                            defaultReasons[s.id] = activeLeave.reason;
                        } else {
                            defaults[s.id] = 'P';
                            defaultReasons[s.id] = '';
                        }
                    });
                    state.currentDayAttendance = defaults;
                    state.currentDayReasons = defaultReasons;
                }
            } catch (e) { showToast("Local Mode"); }
            render();
        }

        // --- STREAMING_CHUNK: Defining router & basic authentication logic... ---
        window.handleLogin = (e) => {
            if (e) e.preventDefault();
            const userIn = document.getElementById('login-user').value.toLowerCase().trim();
            const passIn = document.getElementById('login-pass').value.trim();
            if (userIn === "hafiz rehman ali" && passIn === "4248") {
                state.isLoggedIntoApp = true;
                state.view = 'dashboard';
                render();
                showToast("Assalamu Alaikum", "check-circle");
            } else {
                showToast("Login Denied", "shield-alert");
            }
        };

        window.setView = (viewName) => {
            if (!state.isLoggedIntoApp && viewName !== 'login') return;
            state.view = viewName;
            state.searchQuery = '';
            state.editingStudent = null;
            if (viewName === 'mark-attendance') fetchDayAttendance(state.selectedDate);
            const main = document.getElementById('main-content');
            if (main) main.scrollTop = 0;
            render();
        };

        window.handleSearch = (e) => {
            state.searchQuery = e.target.value.toLowerCase();
            render();
        };

        // --- STREAMING_CHUNK: Handling enrollment and record writing controllers... ---
        window.addStudent = async () => {
            const name = document.getElementById('new-student-name').value.trim();
            const father = document.getElementById('new-student-father').value.trim();
            const rollNo = document.getElementById('new-student-roll').value.trim();
            const contactNo = document.getElementById('new-student-contact').value.trim();
            const relation = document.getElementById('new-student-relation').value.trim();

            if (!name || !rollNo || !father) return showToast("Required: Roll#, Name & Father Name", "alert-circle");
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'students'), {
                    name, 
                    fatherName: father, 
                    rollNo, 
                    contactNo: contactNo || '', 
                    contactRelation: relation || 'Father',
                    createdAt: new Date().toISOString()
                });
                showToast("Registered", "user-plus");
                document.getElementById('new-student-name').value = '';
                document.getElementById('new-student-father').value = '';
                document.getElementById('new-student-contact').value = '';
                document.getElementById('new-student-relation').value = '';
            } catch (e) { showToast("Sync Error"); }
        };

        window.startEditing = (studentId) => {
            state.editingStudent = state.students.find(s => s.id === studentId);
            render();
            const mainContent = document.getElementById('main-content');
            if (mainContent) {
                mainContent.scrollTo({ top: 0, behavior: 'smooth' });
            }
        };

        window.saveEdit = async () => {
            const name = document.getElementById('edit-student-name').value.trim();
            const father = document.getElementById('edit-student-father').value.trim();
            const rollNo = document.getElementById('edit-student-roll').value.trim();
            const contactNo = document.getElementById('edit-student-contact').value.trim();
            const relation = document.getElementById('edit-student-relation').value.trim();

            if (!name || !rollNo || !father) return showToast("Required: Roll#, Name & Father Name", "alert-circle");
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'students', state.editingStudent.id);
                await updateDoc(docRef, { 
                    name, 
                    fatherName: father, 
                    rollNo, 
                    contactNo: contactNo || '', 
                    contactRelation: relation || 'Father' 
                });
                state.editingStudent = null;
                showToast("Updated", "check-circle");
                render();
            } catch (e) { showToast("Save failed"); }
        };

        window.cancelEdit = () => {
            state.editingStudent = null;
            render();
        };

        window.deleteStudent = async (id) => {
            if(confirm("Remove this student?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'students', id));
                showToast("Removed", "trash-2");
            }
        };

        // --- STREAMING_CHUNK: Implementing planned class-offs & Range leave planners... ---
        window.addClassOff = async () => {
            const start = document.getElementById('holiday-start-date').value;
            const end = document.getElementById('holiday-end-date').value;
            const label = document.getElementById('holiday-label').value.trim();
            if (!start || !end || !label) return showToast("Required: Start Date, End Date, and Label", "alert-circle");

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'holidays'), {
                    startDate: start,
                    endDate: end,
                    label: label
                });
                showToast("Planned Off Registered", "check-circle");
                document.getElementById('holiday-label').value = '';
            } catch (e) { showToast("Failed to save holiday"); }
        };

        window.deleteClassOff = async (id) => {
            if (confirm("Cancel this planned off?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'holidays', id));
                showToast("Planned Off Removed", "trash-2");
            }
        };

        window.addLeaveRequest = async () => {
            const sid = document.getElementById('leave-student-id').value;
            const start = document.getElementById('leave-start-date').value;
            const end = document.getElementById('leave-end-date').value;
            const reason = document.getElementById('leave-reason').value.trim();

            if (!sid || !start || !end || !reason) return showToast("Please fill all leave planner fields", "alert-circle");
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'leaves'), {
                    studentId: sid,
                    startDate: start,
                    endDate: end,
                    reason: reason
                });
                showToast("Range Leave Stored", "check-circle");
                document.getElementById('leave-reason').value = '';
            } catch (e) { showToast("Failed to save leave planner"); }
        };

        window.deleteLeaveRequest = async (id) => {
            if (confirm("Remove this leave record?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'leaves', id));
                showToast("Leave Record Deleted", "trash-2");
            }
        };

        window.updateDate = (val) => {
            state.selectedDate = val;
            fetchDayAttendance(val);
        };

        window.updateReportMonth = (val) => {
            state.selectedReportMonth = val;
            render();
        };

        window.updateWeeklyStart = (val) => {
            state.selectedWeekStart = getMonday(new Date(val)).toISOString().split('T')[0];
            render();
        };

        window.changeWeek = (offset) => {
            let current = new Date(state.selectedWeekStart);
            current.setDate(current.getDate() + (offset * 7));
            state.selectedWeekStart = current.toISOString().split('T')[0];
            render();
        };

        window.setStatus = (sid, status) => {
            state.currentDayAttendance[sid] = status;
            if (status !== 'L') {
                state.currentDayReasons[sid] = '';
            }
            render();
        };

        window.updateLeaveReason = (sid, reasonVal) => {
            state.currentDayReasons[sid] = reasonVal;
        };

        window.markAll = (status) => {
            state.students.forEach(s => {
                state.currentDayAttendance[s.id] = status;
                if (status !== 'L') state.currentDayReasons[s.id] = '';
            });
            render();
        };

        window.saveAttendance = async () => {
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'attendance', state.selectedDate), {
                    date: state.selectedDate,
                    records: state.currentDayAttendance,
                    reasons: state.currentDayReasons || {}
                });
                showToast("Saved to Cloud", "cloud-upload");
                setView('dashboard');
            } catch (e) { showToast("Saved Offline"); }
        };

        window.confirmAndCall = (studentName, fatherName, relation, number) => {
            document.getElementById('call-student-name').innerText = studentName;
            document.getElementById('call-father-name').innerText = fatherName || '-';
            document.getElementById('call-relation').innerText = relation || 'Relation';
            document.getElementById('call-number').innerText = number;
            document.getElementById('call-link-btn').setAttribute('href', `tel:${number}`);

            const modal = document.getElementById('call-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('div').classList.remove('scale-95');
            }, 50);
        };

        window.closeCallModal = () => {
            const modal = document.getElementById('call-modal');
            modal.classList.add('opacity-0');
            modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        };

        // --- STREAMING_CHUNK: Designing professional ExcelJS export with high-contrast holiday rendering... ---
        window.downloadExcelReport = async () => {
            try {
                const [year, month] = state.selectedReportMonth.split('-').map(Number);
                const daysInMonth = new Date(year, month, 0).getDate();
                const monthName = new Date(year, month - 1, 1).toLocaleString('default', { month: 'long', year: 'numeric' });

                const workbook = new ExcelJS.Workbook();
                const wsRegister = workbook.addWorksheet("Monthly Register", { views: [{ showGridLines: true }] });
                const wsDirectory = workbook.addWorksheet("Contact Directory", { views: [{ showGridLines: true }] });

                const borderThin = { style: 'thin', color: { argb: 'FFCBD5E1' } };
                const borderThickDivider = { style: 'medium', color: { argb: 'FF1E293B' } };
                const borderDoubleRight = { style: 'medium', color: { argb: 'FF000000' } };

                const standardBorder = { top: borderThin, left: borderThin, bottom: borderThin, right: borderThin };
                const dividerBorder = { top: borderThin, left: borderThin, bottom: borderThin, right: borderThickDivider };
                const doubleDividerBorder = { top: borderThin, left: borderThin, bottom: borderThin, right: borderDoubleRight };

                const colPctIdx = 7 + daysInMonth;

                // Title merged block
                wsRegister.mergeCells(1, 1, 1, colPctIdx);
                const titleCell = wsRegister.getCell('A1');
                titleCell.value = `MASJID ATTENDANCE REGISTER - ${monthName.toUpperCase()}`;
                titleCell.font = { name: 'Inter', bold: true, size: 14, color: { argb: 'FFFFFFFF' } };
                titleCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF047857' } };
                titleCell.alignment = { horizontal: 'center', vertical: 'middle' };
                wsRegister.getRow(1).height = 40;

                wsRegister.mergeCells(2, 1, 2, colPctIdx);
                const subCell = wsRegister.getCell('A2');
                subCell.value = "Class Teacher: Hafiz Rehman Ali";
                subCell.font = { name: 'Inter', bold: true, size: 10, color: { argb: 'FFD1FAE5' } };
                subCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF065F46' } };
                subCell.alignment = { horizontal: 'center', vertical: 'middle' };
                wsRegister.getRow(2).height = 24;

                wsRegister.getRow(3).height = 15;

                const headerRow = wsRegister.getRow(4);
                headerRow.height = 28;

                headerRow.getCell(1).value = "Roll No";
                headerRow.getCell(1).border = dividerBorder;
                
                headerRow.getCell(2).value = "Student Name";
                headerRow.getCell(2).border = dividerBorder;
                
                headerRow.getCell(3).value = "Father Name";
                headerRow.getCell(3).border = doubleDividerBorder;

                for (let d = 1; d <= daysInMonth; d++) {
                    const colIdx = 3 + d;
                    const cell = headerRow.getCell(colIdx);
                    cell.value = d;
                    cell.border = (d === daysInMonth) ? doubleDividerBorder : standardBorder;
                    cell.alignment = { horizontal: 'center', vertical: 'middle' };
                    
                    // If this date is a holiday, shade header gray
                    const dateStr = `${state.selectedReportMonth}-${String(d).padStart(2, '0')}`;
                    if (getActiveHoliday(dateStr)) {
                        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFE2E8F0' } };
                    }
                }

                const colPIdx = 4 + daysInMonth;
                const colAIdx = 5 + daysInMonth;
                const colLIdx = 6 + daysInMonth;
                const colPct = colPctIdx;

                headerRow.getCell(colPIdx).value = "P";
                headerRow.getCell(colPIdx).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFD1FAE5' } };
                headerRow.getCell(colPIdx).border = standardBorder;
                headerRow.getCell(colPIdx).alignment = { horizontal: 'center' };

                headerRow.getCell(colAIdx).value = "A";

                });

                filteredAtt.forEach(day => {
                    Object.entries(day.records || {}).forEach(([sid, status]) => {
                        if (statsMap[sid]) { statsMap[sid][status]++; statsMap[sid].total++; }
                    });
                });
                const reportData = Object.values(statsMap);

                // Compile all daily leave reasons written this month
                const monthlyReasonsList = [];
                filteredAtt.forEach(day => {
                    if (day.reasons) {
                        Object.entries(day.reasons).forEach(([sid, reason]) => {
                            if (reason && reason.trim() !== '') {
                                const student = state.students.find(s => s.id === sid);
                                if (student) {
                                    monthlyReasonsList.push({
                                        date: day.date,
                                        roll: student.rollNo,
                                        name: student.name,
                                        reason: reason
                                    });
                                }
                            }
                        });
                    }
                });

                // --- STREAMING_CHUNK: Compiling reports statistics... ---
                container.innerHTML = `
                    <div class="p-6 pb-24">
                        <div class="flex items-center justify-between mb-6">
                            <div class="flex items-center gap-4">
                                <button onclick="setView('dashboard')" class="p-2 bg-emerald-50 text-emerald-700 rounded-full"><i data-lucide="arrow-left"></i></button>
                                <h2 class="text-xl font-black text-emerald-900 leading-none">Reports</h2>
                            </div>
                            <input type="month" value="${state.selectedReportMonth}" onchange="updateReportMonth(this.value)" class="p-2 bg-emerald-50 border-0 rounded-xl text-xs font-black text-emerald-700 outline-none">
                        </div>

                        <div class="bg-emerald-600 text-white p-5 rounded-[32px] mb-6 shadow-lg relative overflow-hidden flex justify-between items-center">
                             <div>
                                <p class="text-[10px] font-black uppercase opacity-80 mb-1 leading-none">Register Summary:</p>
                                <p class="font-black text-xl">${new Date(state.selectedReportMonth + '-01').toLocaleString('default', { month: 'long', year: 'numeric' })}</p>
                             </div>
                             <button onclick="downloadExcelReport()" class="bg-white/20 p-3 rounded-2xl border border-white/20 active:scale-90"><i data-lucide="file-down" class="w-6 h-6 text-white"></i></button>
                        </div>

                        <button onclick="downloadExcelReport()" class="w-full mb-6 bg-emerald-50 text-emerald-700 py-4 rounded-2xl font-black text-xs border border-emerald-100 flex items-center justify-center gap-2 active:scale-95 transition-all uppercase tracking-widest"><i data-lucide="download" class="w-4 h-4"></i> Get Excel Spreadsheet</button>

                        <div class="bg-white rounded-[36px] border border-slate-100 shadow-xl overflow-hidden">
                            <table class="w-full text-[11px]">
                                <thead class="bg-slate-50 border-b border-slate-100">
                                    <tr><th class="px-5 py-4 text-left font-black uppercase text-slate-400">Roll</th><th class="px-2 py-4 text-left font-black uppercase text-slate-400">Name</th><th class="py-4 text-center font-black uppercase text-emerald-600">P</th><th class="py-4 text-center font-black uppercase text-red-600">A</th><th class="px-5 py-4 text-right font-black uppercase text-slate-400">%</th></tr>
                                </thead>
                                <tbody class="divide-y divide-slate-50">
                                    ${reportData.map(row => {
                                        const perc = row.total > 0 ? ((row.P / row.total) * 100).toFixed(0) : 0;
                                        return `<tr><td class="px-5 py-4 font-black text-emerald-700">${row.roll}</td><td class="px-2 py-4 font-bold text-slate-700">${row.name}</td><td class="py-4 text-center font-black text-emerald-600">${row.P}</td><td class="py-4 text-center font-black text-red-600">${row.A}</td><td class="px-5 py-4 text-right"><span class="px-2 py-1 rounded-lg font-black ${perc >= 75 ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}">${perc}%</span></td></tr>`;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>

                        <!-- MONTHLY LEAVE REASONS FEED -->
                        <div class="mt-6 bg-white p-5 rounded-[32px] border border-slate-100 shadow-xl">
                            <h3 class="text-xs font-black text-slate-800 uppercase tracking-widest mb-4 flex items-center gap-2">
                                <i data-lucide="book-open" class="w-4 h-4 text-amber-500"></i> Month's Leave Explanations
                            </h3>
                            ${monthlyReasonsList.length > 0 ? `
                                <div class="space-y-3 max-h-64 overflow-y-auto pr-1">
                                    ${monthlyReasonsList.sort((a,b) => b.date.localeCompare(a.date)).map(item => `
                                        <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                                            <div>
                                                <p class="font-extrabold text-xs text-slate-700">${item.name} <span class="text-[10px] text-slate-400">(${item.roll})</span></p>
                                                <p class="text-[11px] text-slate-500 mt-1">Reason: <span class="font-bold text-amber-700">${item.reason}</span></p>
                                            </div>
                                            <span class="text-[10px] font-bold text-slate-400 bg-slate-200 px-2 py-0.5 rounded-md">${item.date}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            ` : `
                                <p class="text-center py-4 text-xs text-slate-400 font-medium">No leave explanations logged this month.</p>
                            `}
                        </div>
                    </div>
                `;
            } else if (state.view === 'backup') {
                container.innerHTML = `
                    <div class="p-6">
                        <div class="flex items-center gap-4 mb-10">
                            <button onclick="setView('dashboard')" class="p-2 bg-emerald-50 text-emerald-700 rounded-full"><i data-lucide="arrow-left"></i></button>
                            <h2 class="text-xl font-black text-emerald-900 leading-none">Security</h2>
                        </div>
                        <div class="bg-white p-12 rounded-[52px] border-2 border-emerald-50 shadow-2xl text-center space-y-8">
                            <div class="w-24 h-24 bg-emerald-600 text-white rounded-[36px] flex items-center justify-center mx-auto shadow-emerald-200 shadow-2xl"><i data-lucide="database-backup" class="w-12 h-12"></i></div>
                            <div>
                                <h3 class="text-2xl font-black text-slate-900 mb-2 leading-tight">Master Backup</h3>
                                <p class="text-sm text-slate-500 font-medium px-4 leading-relaxed tracking-tight">Keep an offline record of every student and every attendance day in your private storage.</p>
                            </div>
                            <button onclick="downloadBackup()" class="w-full bg-emerald-600 text-white py-5 rounded-3xl font-black shadow-lg shadow-emerald-100 active:scale-95 transition-all tracking-widest uppercase text-xs">Download Full JSON Archive</button>
                        </div>
                    </div>
                `;
            }
            lucide.createIcons();
        }

        window.onload = () => { initAuth(); render(); };
    </script>
</body>
</html>
